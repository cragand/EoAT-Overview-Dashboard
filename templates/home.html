{% extends "base.html" %}
{% block title %}EOAT Tracker — Home{% endblock %}
{% block content %}
<div class="dashboard-header">
    <h1>EOAT Tracker</h1>
    <p class="home-subtitle">{{ device_count }} devices tracked · {{ event_count }} work events · Last updated {{ last_sync }}</p>
</div>

<div class="home-grid">
    <div class="home-tile">
        <a href="/timeline" class="tile-header">
            <span class="tile-icon">📊</span>
            <span class="tile-title">Timeline</span>
            <span class="tile-expand">Open ↗</span>
        </a>
        <div class="tile-preview tile-tall">
            <iframe src="/timeline?embed=1" frameborder="0"></iframe>
        </div>
    </div>

    <div class="home-tile">
        <a href="/dashboard" class="tile-header">
            <span class="tile-icon">📋</span>
            <span class="tile-title">Fleet Dashboard</span>
            <span class="tile-expand">Open ↗</span>
        </a>
        <div class="tile-preview">
            <iframe src="/dashboard?embed=1" frameborder="0"></iframe>
        </div>
    </div>

    <div class="home-tile">
        <a href="/kanban" class="tile-header">
            <span class="tile-icon">📌</span>
            <span class="tile-title">Kanban Board</span>
            <span class="tile-expand">Open ↗</span>
        </a>
        <div class="tile-preview">
            <iframe src="/kanban?embed=1" frameborder="0"></iframe>
        </div>
    </div>
</div>
{% endblock %}
