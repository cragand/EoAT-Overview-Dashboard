{% extends "base.html" %}
{% block title %}EOAT Timeline{% endblock %}
{% block content %}
<div class="dashboard-header">
    <h1>EOAT Fleet Timeline</h1>
    <div class="controls" style="margin-top:12px">
        <select id="range-filter" class="filter-select">
            <option value="3">Last 3 Months</option>
            <option value="6">Last 6 Months</option>
            <option value="12" selected>Last 12 Months</option>
            <option value="24">Last 2 Years</option>
            <option value="all">Full History</option>
        </select>
        <select id="type-filter" class="filter-select">
            <option value="">All Types</option>
            {% for t in eoat_types %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
        </select>
        <select id="assignment-filter" class="filter-select">
            <option value="">All Assignments</option>
            {% for a in assignments %}<option value="{{ a }}">{{ a }}</option>{% endfor %}
        </select>
    </div>
</div>

<div class="timeline-legend">
    <span class="legend-item"><span class="legend-color" style="background:var(--deployed)"></span> Deployment</span>
    <span class="legend-item"><span class="legend-color" style="background:var(--storage)"></span> Spare</span>
    <span class="legend-item"><span class="legend-color" style="background:var(--maintenance)"></span> Repairs</span>
    <span class="legend-item"><span class="legend-dot"></span> Work Event</span>
</div>

<div class="gantt-wrapper" id="gantt-wrapper">
    <div class="gantt-container" id="gantt-container"></div>
</div>
<div class="event-popup" id="event-popup" style="display:none">
    <div class="popup-header">
        <span class="popup-title" id="popup-title"></span>
        <button class="popup-close" id="popup-close">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
</div>
<div class="popup-overlay" id="popup-overlay" style="display:none"></div>

<script>
var TIMELINE_DATA = {{ timeline_data | tojson }};
var popup = document.getElementById('event-popup');
var overlay = document.getElementById('popup-overlay');

function closePopup() { popup.style.display = 'none'; overlay.style.display = 'none'; }
document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('popup-overlay').addEventListener('click', closePopup);

function showEventPopup(evt, x, y) {
    document.getElementById('popup-title').textContent = evt.name;
    var html = '<div class="popup-field"><span class="popup-label">Date</span>' + evt.date + '</div>';
    if (evt.type) html += '<div class="popup-field"><span class="popup-label">Category</span>' + evt.type + '</div>';
    if (evt.section) html += '<div class="popup-field"><span class="popup-label">Section</span>' + evt.section + '</div>';
    if (evt.performed_by) html += '<div class="popup-field"><span class="popup-label">Assignee</span>' + evt.performed_by + '</div>';
    if (evt.site) html += '<div class="popup-field"><span class="popup-label">Site</span>' + evt.site + '</div>';
    if (evt.workcell) html += '<div class="popup-field"><span class="popup-label">Workcell</span>' + evt.workcell + '</div>';
    html += '<div class="popup-field"><span class="popup-label">Status</span>' + (evt.completed ? '✓ Completed' : '○ Open') + '</div>';
    if (evt.description) {
        var desc = evt.description.replace(/\n/g, '<br>').substring(0, 300);
        html += '<div class="popup-desc">' + desc + '</div>';
    }
    if (evt.task_gid) {
        html += '<div class="popup-link"><a href="https://app.asana.com/0/0/' + evt.task_gid + '" target="_blank">Open in Asana ↗</a></div>';
    }
    document.getElementById('popup-body').innerHTML = html;
    popup.style.display = 'block';
    overlay.style.display = 'block';
    // Position near click but keep on screen
    var rect = popup.getBoundingClientRect();
    var px = Math.min(x + 10, window.innerWidth - 340);
    var py = Math.min(y + 10, window.innerHeight - rect.height - 20);
    popup.style.left = px + 'px';
    popup.style.top = py + 'px';
}

function renderGantt() {
    var range = document.getElementById('range-filter').value;
    var typeF = document.getElementById('type-filter').value;
    var assignF = document.getElementById('assignment-filter').value;
    var container = document.getElementById('gantt-container');

    var now = new Date();
    var minDate, maxDate = now;

    if (range === 'all') {
        minDate = new Date('2024-01-01');
        TIMELINE_DATA.forEach(function(d) {
            d.events.forEach(function(e) {
                var ed = new Date(e.date);
                if (ed < minDate) minDate = ed;
            });
        });
    } else {
        minDate = new Date(now);
        minDate.setMonth(minDate.getMonth() - parseInt(range));
    }

    var totalMs = maxDate - minDate;

    // Filter devices
    var devices = TIMELINE_DATA.filter(function(d) {
        if (typeF && d.eoat_type !== typeF) return false;
        if (assignF && d.assignment !== assignF) return false;
        return true;
    });

    // Build month markers
    var months = [];
    var m = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
    while (m <= maxDate) {
        months.push(new Date(m));
        m.setMonth(m.getMonth() + 1);
    }

    var html = '<div class="gantt-header"><div class="gantt-label-col"></div><div class="gantt-bar-col">';
    months.forEach(function(mo) {
        var left = ((mo - minDate) / totalMs * 100);
        var label = mo.toLocaleDateString('en-US', {month:'short', year:'2-digit'});
        html += '<div class="gantt-month" style="left:' + left + '%">' + label + '</div>';
    });
    html += '</div></div>';

    devices.forEach(function(d, di) {
        html += '<div class="gantt-row" data-serial="' + d.serial + '">';
        html += '<div class="gantt-label-col"><a href="/device/' + d.serial + '">' + d.name + '</a>';
        html += '<span class="gantt-label-sub">' + (d.current_location || '') + '</span></div>';
        html += '<div class="gantt-bar-col">';

        // Draw assignment periods (inferred from events)
        if (d.periods) {
            d.periods.forEach(function(p) {
                var start = new Date(p.start);
                var end = p.end ? new Date(p.end) : maxDate;
                if (end < minDate || start > maxDate) return;
                if (start < minDate) start = minDate;
                if (end > maxDate) end = maxDate;
                var left = (start - minDate) / totalMs * 100;
                var width = (end - start) / totalMs * 100;
                var cls = 'period-' + (p.type || 'unknown').toLowerCase().replace(/\s+/g, '-');
                var title = p.type + (p.location ? ' @ ' + p.location : '');
                if (p.start_label) title += '\n' + p.start_label;
                html += '<div class="gantt-period ' + cls + '" style="left:' + left + '%;width:' + Math.max(width, 0.3) + '%" title="' + title.replace(/"/g,'&quot;') + '"></div>';
            });
        }

        // Draw event markers
        d.events.forEach(function(e, ei) {
            var ed = new Date(e.date);
            if (ed < minDate || ed > maxDate) return;
            var left = (ed - minDate) / totalMs * 100;
            var cls = e.completed ? 'event-complete' : 'event-open';
            html += '<div class="gantt-event ' + cls + '" style="left:' + left + '%" data-device="' + di + '" data-event="' + ei + '"></div>';
        });

        html += '</div></div>';
    });

    container.innerHTML = html;

    // Attach click handlers to event dots
    container.querySelectorAll('.gantt-event').forEach(function(el) {
        el.addEventListener('click', function(ev) {
            var di = parseInt(el.getAttribute('data-device'));
            var ei = parseInt(el.getAttribute('data-event'));
            showEventPopup(devices[di].events[ei], ev.clientX, ev.clientY);
            ev.stopPropagation();
        });
    });
}

document.getElementById('range-filter').addEventListener('change', renderGantt);
document.getElementById('type-filter').addEventListener('change', renderGantt);
document.getElementById('assignment-filter').addEventListener('change', renderGantt);
renderGantt();
</script>
{% endblock %}
