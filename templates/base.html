<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EOAT Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">EOAT Tracker</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/kanban" class="{% if request.path == '/kanban' %}active{% endif %}">Kanban</a>
            <a href="/timeline" class="{% if request.path == '/timeline' %}active{% endif %}">Timeline</a>
        </div>
        <div class="nav-sync">
            <span class="sync-status" title="Using mock data">⚠ Mock Data</span>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
